config-version = 2

# Keep the tree normalized so new windows split the focused side in BSP fashion
# instead of growing into one long row of columns.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Bias new workspaces toward a master/stack-style tiled layout.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
    ctrl-enter = 'exec-and-forget open -na Ghostty'

    ctrl-shift-q = 'close'

    ctrl-h = 'focus left'
    ctrl-j = 'focus down'
    ctrl-k = 'focus up'
    ctrl-l = 'focus right'

    ctrl-shift-h = 'move left'
    ctrl-shift-j = 'move down'
    ctrl-shift-k = 'move up'
    ctrl-shift-l = 'move right'

    ctrl-v = 'join-with right'
    ctrl-b = 'join-with down'

    ctrl-shift-f = 'fullscreen'

    ctrl-s = 'layout v_accordion'
    ctrl-e = 'layout h_accordion'
    ctrl-w = 'layout tiles horizontal vertical'

    ctrl-1 = 'workspace 1'
    ctrl-2 = 'workspace 2'
    ctrl-3 = 'workspace 3'
    ctrl-4 = 'workspace 4'
    ctrl-5 = 'workspace 5'
    ctrl-6 = 'workspace 6'
    ctrl-7 = 'workspace 7'
    ctrl-8 = 'workspace 8'
    ctrl-9 = 'workspace 9'
    ctrl-0 = 'workspace 10'
    ctrl-comma = 'workspace prev --wrap-around'
    ctrl-period = 'workspace next --wrap-around'

    ctrl-shift-1 = 'move-node-to-workspace 1'
    ctrl-shift-2 = 'move-node-to-workspace 2'
    ctrl-shift-3 = 'move-node-to-workspace 3'
    ctrl-shift-4 = 'move-node-to-workspace 4'
    ctrl-shift-5 = 'move-node-to-workspace 5'
    ctrl-shift-6 = 'move-node-to-workspace 6'
    ctrl-shift-7 = 'move-node-to-workspace 7'
    ctrl-shift-8 = 'move-node-to-workspace 8'
    ctrl-shift-9 = 'move-node-to-workspace 9'
    ctrl-shift-0 = 'move-node-to-workspace 10'
    ctrl-shift-comma = 'move-node-to-workspace prev'
    ctrl-shift-period = 'move-node-to-workspace next'

    ctrl-shift-c = 'reload-config'

[gaps]
    inner.horizontal = 4
    inner.vertical = 4
    outer.left = 24
    outer.bottom = 24
    outer.top = 24
    outer.right = 24
